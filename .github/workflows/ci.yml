name: CI workflow

on:
  push:
    branches:
      - main
      - feature/*
      - refactor/*
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.25.6
          cache: true

      - name: Verify Go version
        run: go version

      - name: Download dependencies
        run: go mod tidy

      - name: Run tests
        run: go test -v ./...
