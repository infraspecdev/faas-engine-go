name: CI workflow

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main

jobs:
  build-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.25.6
      - name: Checking Go version
        run: go version
      - name: Checkout code and run tests
        uses: actions/checkout@v5
      - name: setup go dependency
        run: go mod tidy
      - name: run tests
        run: go test -v ./...
