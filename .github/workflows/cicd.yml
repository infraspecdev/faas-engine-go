name: CICD workflow

on:
  push:
    branches:
      - main
      - feature/*
      - refactor/*
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.25.6
          cache: true

      - name: Verify Go version
        run: go version

      - name: Download dependencies
        run: go mod tidy

      - name: Run linters
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout 5m
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.25.6
          cache: true

      - name: Verify Go version
        run: go version

      - name: Download dependencies
        run: go mod tidy

      - name: Verify registry is running
        run: |
          curl http://localhost:5000/v2/_catalog || true

      - name: Run tests
        env:
          REGISTRY_URL: localhost:5000
        run: go test -v ./...

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.25.6
          cache: true

      - name: Verify Go version
        run: go version

      - name: Download dependencies
        run: go mod tidy

      - name: Build application
        run: |
          mkdir -p ./bin
          go build -o ./bin/runtime-manager ./cmd/runtime-manager/.

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-manager-binary
          path: ./bin/runtime-manager

      - name: Upload service artifact
        uses: actions/upload-artifact@v4
        with:
          name: faas-engine.service
          path: ./infra/faas-engine.service

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: runtime-manager-binary
          path: ./artifacts

      - name: Download service artifact
        uses: actions/download-artifact@v4
        with:
          name: faas-engine.service
          path: ./artifacts

      - name: Setting up WireGuard VPN
        uses: egor-tensin/setup-wireguard@v1
        with:
          endpoint: ${{ secrets.WG_SERVER_ENDPOINT }}
          endpoint_public_key: ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          private_key: ${{ secrets.WG_PRIVATE_KEY }}
          ips: "${{ vars.VPN_CLIENT_IP }}/32"
          allowed_ips: "${{ vars.TARGET_PRIVATE_IP }}/32"

      - name: Verify wireguard connection
        run: |
          echo "==== WireGuard Status ===="
          sudo wg
          echo "==== Routing Table ===="
          ip route
          echo "==== Runner ip ===="
          ip addr show

      - name: Test SSH over VPN
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.TARGET_PRIVATE_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Connected to server"
            whoami
            hostname

      - name: Debug artifacts before SCP
        run: |
          echo "=== Workspace ==="  
          ls -la
          echo "=== Artifacts ==="
          ls -la artifacts

      - name: Prepare deployment directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.TARGET_PRIVATE_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /opt/faas-engine
            sudo chown -R $USER:$USER /opt/faas-engine

      - name: Copy runtimes to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.TARGET_PRIVATE_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./runtimes/"
          target: "/opt/faas-engine/"

      - name: Build runtime images on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.TARGET_PRIVATE_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Building runtime images..."

            cd /opt/faas-engine/runtimes

            docker build -t localhost:5000/runtimes/node:v1 node-runtime
            docker build -t localhost:5000/runtimes/python:v1 python-runtime

            docker push localhost:5000/runtimes/node:v1
            docker push localhost:5000/runtimes/python:v1

            echo "Runtime images built and pushed to local registry"

      - name: Copy binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.TARGET_PRIVATE_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./artifacts/runtime-manager"
          target: "/tmp"
          # strip_components: 1

      - name: Copy service file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.TARGET_PRIVATE_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./artifacts/faas-engine.service"
          target: "/tmp"
          # strip_components: 1

      - name: Deploy and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.TARGET_PRIVATE_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Starting Deployment ==="

            echo "=== DEBUG: /tmp contents ==="
            ls -l /tmp

            echo "=== Stopping existing service ==="
            sudo systemctl stop faas-engine || true

            # Ensure required directories exist
            sudo mkdir -p /opt/faas-engine
            sudo mkdir -p /backup/bin
            sudo mkdir -p /backup/services

            TIMESTAMP=$(date +%Y%m%d-%H%M%S)

            echo "=== Backing up existing binary if present ==="
            if [ -f /opt/faas-engine/runtime-manager ]; then
              sudo cp /opt/faas-engine/runtime-manager \
                /backup/bin/runtime-manager.$TIMESTAMP
              echo "Binary backup created"
            else
              echo "No existing binary to back up"
            fi

            echo "=== Backing up existing service file if present ==="
            if [ -f /etc/systemd/system/faas-engine.service ]; then
              sudo cp /etc/systemd/system/faas-engine.service \
                /backup/services/faas-engine.service.$TIMESTAMP
              echo "Service backup created"
            else
              echo "No existing service file to back up"
            fi

            echo "=== Cleaning old runtime-manager completely ==="
            sudo rm -rf /opt/faas-engine/runtime-manager

            echo "=== Deploying new binary ==="
            sudo mv /tmp/artifacts/runtime-manager /opt/faas-engine/runtime-manager
            sudo chmod +x /opt/faas-engine/runtime-manager

            echo "=== Deploying new service file ==="
            sudo mv /tmp/artifacts/faas-engine.service /etc/systemd/system/faas-engine.service

            echo "=== Reloading systemd ==="
            sudo systemctl daemon-reload
            sudo systemctl enable faas-engine

            echo "=== Starting service ==="
            sudo systemctl restart faas-engine

            echo "=== Checking Service Status ==="
            if ! sudo systemctl is-active --quiet faas-engine; then
              echo "Service failed to start"
              sudo journalctl -u faas-engine -n 50 --no-pager
              exit 1
            fi

            echo "Service deployed successfully"
